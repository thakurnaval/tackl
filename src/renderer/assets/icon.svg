<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Eisenhower Matrix app icon</title>
  <desc id="desc">Rounded four-quadrant task matrix with a bold EM monogram and urgency and importance markers.</desc>
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#6f6f6f" flood-opacity="0.24" />
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#374151" flood-opacity="0.28" />
    </filter>
    <linearGradient id="surfaceGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="64" fill="#efefef" />

  <g filter="url(#panelShadow)">
    <clipPath id="boardClip">
      <rect x="43" y="43" width="426" height="426" rx="40" />
    </clipPath>

    <g clip-path="url(#boardClip)">
      <rect x="43" y="43" width="213" height="213" fill="#f37b68" />
      <rect x="256" y="43" width="213" height="213" fill="#a8d98d" />
      <rect x="43" y="256" width="213" height="213" fill="#efc93b" />
      <rect x="256" y="256" width="213" height="213" fill="#a9b7c7" />
      <rect x="43" y="43" width="426" height="426" fill="url(#surfaceGlow)" />
    </g>
  </g>

  <g font-family="Avenir Next, Futura, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
    <g>
      <circle cx="79" cy="79" r="16" fill="#b93326" fill-opacity="0.78" />
      <text x="79" y="87" fill="#ffffff">U</text>
    </g>
    <g>
      <circle cx="433" cy="79" r="16" fill="#4d8d38" fill-opacity="0.7" />
      <text x="433" y="87" fill="#ffffff">N</text>
    </g>
    <g>
      <circle cx="79" cy="433" r="16" fill="#b98506" fill-opacity="0.72" />
      <text x="79" y="441" fill="#ffffff">U</text>
    </g>
    <g>
      <circle cx="433" cy="433" r="16" fill="#64748b" fill-opacity="0.76" />
      <text x="433" y="441" fill="#ffffff">N</text>
    </g>
  </g>

  <text
    x="256"
    y="313"
    fill="#ffffff"
    font-family="Avenir Next Condensed, Arial Narrow, Arial, sans-serif"
    font-size="158"
    font-weight="800"
    letter-spacing="-10"
    text-anchor="middle"
    filter="url(#textShadow)"
  >EM</text>
</svg>